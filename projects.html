<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Projects — Srikanth Madabhushi</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav>
  <div><strong>Projects</strong></div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="Srikanth_Madabhushi_Resume.pdf" class="btn secondary">Resume</a>
    <a href="https://www.linkedin.com/in/srikanthmadabhushi" target="_blank" rel="noopener" class="btn">LinkedIn</a>
  </div>
</nav>
<section class="container section">
  <h1>Modules & Projects</h1>
  <p class="small">Each project lists (1) Domain/Market, (2) Tech Specs & Best Practices, (3) Problem, (4) Hypothesis, and (5) Working Prototype, followed by a link.</p>
</section>

<section id="modules" class="container section"></section>

<script>
async function load() { 
  const resp = await fetch('projects.json');
  const data = await resp.json();
  const wrap = document.getElementById('modules');
  data.modules.forEach(m => {
    const h = document.createElement('h2');
    h.id = m.name;
    h.textContent = m.name;
    wrap.appendChild(h);
    const grid = document.createElement('div');
    grid.className = 'grid';
    wrap.appendChild(grid);
    m.projects.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      const t = document.createElement('h3');
      t.innerHTML = p.title;
      const ul = document.createElement('ul');
      ul.className = 'project-points';
      const points = [
        ['Domain & Market', p.domain],
        ['Tech Specs & Best Practices', p.tech],
        ['Problem', p.problem],
        ['Hypothesis', p.hypothesis],
        ['Working Prototype', p.prototype]
      ];
      points.forEach(([k,v]) => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${k}:</strong> ${v}`;
        ul.appendChild(li);
      });
      const link = document.createElement('p');
      link.innerHTML = `<a href="${p.repo}" target="_blank" rel="noopener" class="btn secondary">View Repository</a>`;
      card.appendChild(t);
      card.appendChild(ul);
      card.appendChild(link);
      grid.appendChild(card);
    });
  });
}
load();
</script>

<footer class="container footer small">Back to <a href="index.html">Home</a></footer>
</body>
</html>
