<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Projects</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site sticky">
  <div class="container bar">
    <a class="brand" href="index.html">Srikanth Madabhushi</a>
    <details class="menu">
      <summary aria-label="Toggle menu"><span></span><span></span><span></span></summary>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="index.html#future">Future 2025–2030</a>
        <a href="blog.html">Blog</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </details>
  </div>
</header>

<section class="container section">
<h1>Projects</h1>
<div id="projects-root"></div>
</section>

<script>
async function render(){
  const root=document.getElementById('projects-root');
  const res=await fetch('projects_final.json');
  const data=await res.json();
  data.modules.forEach(mod=>{
    const sec=document.createElement('section');
    sec.innerHTML=`<h2>${mod.name}</h2>`;
    const grid=document.createElement('div');
    grid.className='grid';
    mod.projects.forEach(p=>{
      const card=document.createElement('article');
      card.className='card';
      card.innerHTML=`
        <img src="${p.image}">
        <h4>${p.title}</h4>
        <p>${p.summary||""}</p>
        <a class="btn" href="${p.repo}" target="_blank">View Repo</a>
      `;
      const d=document.createElement('details');
      d.innerHTML=`<summary>Details (5‑Point)</summary>
      <div class='proj-points'>
        <div><strong>1) Domain / Market</strong><ul>${p.points.domainMarketPositioning.map(i=>`<li>${i}</li>`).join('')}</ul></div>
        <div><strong>2) Technical Architecture</strong><ul>${p.points.technicalArchitecture.map(i=>`<li>${i}</li>`).join('')}</ul></div>
        <div><strong>3) Problem</strong><p>${p.points.problem}</p></div>
        <div><strong>4) Hypothesis</strong><p>${p.points.hypothesis}</p></div>
        <div><strong>5) Prototype</strong><ul>${p.points.prototype.map(i=>`<li>${i}</li>`).join('')}</ul></div>
      </div>`;
      card.appendChild(d);
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    root.appendChild(sec);
  });
}
render();
</script>
</body>
</html>
