<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="408" viewBox="0 0 1900 408">
  <defs>
    <linearGradient id="bggrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.25"/>
    </linearGradient>
    <style>
      .title { font-family: 'Segoe UI', Inter, Arial, sans-serif; font-size: 54px; font-weight: 800; fill: #F8FAFC; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 18px; fill: #E5F6FF; text-anchor: middle; }
      .pill { fill: rgba(2,6,23,0.75); stroke: rgba(56,189,248,0.45); }
      .mesh-line { stroke: rgba(203, 255, 255, 0.25); stroke-width: 1; fill: none; }
      .mesh-node { fill: rgba(203, 255, 255, 0.35); }
      .particle { fill: rgba(233, 255, 255, 0.28); }
      .wordmark { font-family: 'Segoe UI', Inter, Arial, sans-serif; font-weight: 800; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Background gradient -->
  <rect width="1900" height="408" fill="url(#bggrad)"/>
  <path d="M0,340 C300,370 600,320 900,360 C1200,390 1500,340 1900,370 L1900,408 L0,408 Z" fill="url(#wave)" opacity="0.42"/>

  <!-- Title -->
  <text x="120" y="110" class="title">ServiceNow + AI</text>

  <!-- Subtle AI neural/circuit mesh (behind graph area only) -->
  <g opacity="0.75">
    <g transform="translate(420,40)">
      <circle class="mesh-node" cx="80" cy="60" r="2.5"/>
      <circle class="mesh-node" cx="160" cy="90" r="2.5"/>
      <circle class="mesh-node" cx="260" cy="50" r="2.5"/>
      <circle class="mesh-node" cx="340" cy="110" r="2.5"/>
      <circle class="mesh-node" cx="420" cy="70" r="2.5"/>
      <circle class="mesh-node" cx="520" cy="100" r="2.5"/>
      <circle class="mesh-node" cx="600" cy="60" r="2.5"/>
      <circle class="mesh-node" cx="700" cy="95" r="2.5"/>
      <circle class="mesh-node" cx="820" cy="70" r="2.5"/>
      <path class="mesh-line" d="M80,60 L160,90 L260,50 L340,110 L420,70 L520,100 L600,60 L700,95 L820,70"/>
      <path class="mesh-line" d="M80,80 C200,140 380,20 520,120 S760,40 820,95"/>
    </g>
    <g transform="translate(380,200)">
      <circle class="mesh-node" cx="60" cy="40" r="2.5"/>
      <circle class="mesh-node" cx="140" cy="20" r="2.5"/>
      <circle class="mesh-node" cx="220" cy="60" r="2.5"/>
      <circle class="mesh-node" cx="320" cy="30" r="2.5"/>
      <circle class="mesh-node" cx="420" cy="65" r="2.5"/>
      <circle class="mesh-node" cx="500" cy="35" r="2.5"/>
      <circle class="mesh-node" cx="600" cy="60" r="2.5"/>
      <circle class="mesh-node" cx="720" cy="35" r="2.5"/>
      <path class="mesh-line" d="M60,40 L140,20 L220,60 L320,30 L420,65 L500,35 L600,60 L720,35"/>
    </g>
    <g>
      <circle class="particle" cx="520" cy="80" r="2"/>
      <circle class="particle" cx="880" cy="70" r="2"/>
      <circle class="particle" cx="740" cy="130" r="2"/>
      <circle class="particle" cx="980" cy="120" r="2"/>
    </g>
  </g>

  <!-- Curved connected line with 6 points -->
  <path d="M250,200 C400,120 700,280 950,180 C1200,80 1450,220 1700,140" fill="none" stroke="#A7F3D0" stroke-width="3"/>
  <!-- Points -->
  <circle cx="250" cy="200" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>
  <circle cx="550" cy="180" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>
  <circle cx="850" cy="230" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>
  <circle cx="1150" cy="160" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>
  <circle cx="1450" cy="210" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>
  <circle cx="1700" cy="140" r="8" fill="#ECFEFF" stroke="#16a34a" stroke-width="3"/>

  <!-- Labels below each point -->
  <g>
    <rect x="180" y="240" rx="14" ry="14" width="140" height="34" class="pill"/>
    <text x="250" y="262" class="label">Flow Designer</text>
    <rect x="460" y="220" rx="14" ry="14" width="180" height="34" class="pill"/>
    <text x="550" y="242" class="label">Predictive Intelligence</text>
    <rect x="770" y="270" rx="14" ry="14" width="160" height="34" class="pill"/>
    <text x="850" y="292" class="label">Agentic Workflows</text>
    <rect x="1070" y="200" rx="14" ry="14" width="160" height="34" class="pill"/>
    <text x="1150" y="222" class="label">Generative AI</text>
    <rect x="1360" y="250" rx="14" ry="14" width="190" height="34" class="pill"/>
    <text x="1450" y="272" class="label">IntegrationHub/APIs</text>
    <rect x="1630" y="180" rx="14" ry="14" width="100" height="34" class="pill"/>
    <text x="1680" y="202" class="label">AIOps</text>
  </g>

  <!-- Subtle cube (right side) -->
  <g transform="translate(1720, 80)" opacity="0.35">
    <polygon points="0,40 40,20 80,40 40,60" fill="#0ea5e9"/>
    <polygon points="40,20 80,40 80,80 40,60" fill="#22c55e" opacity="0.6"/>
    <polygon points="0,40 40,60 40,100 0,80" fill="#22c55e" opacity="0.4"/>
  </g>

  <!-- Option C logos -->
  <!-- ServiceNow wordmark (monochrome, top-left, semi-transparent as placeholder text) -->
  <g transform="translate(120,36)" opacity="0.15">
    <text class="wordmark" x="0" y="0" font-size="28" fill="#ffffff">servicenow</text>
  </g>

  <!-- AI icon near the cube (simple brain/circuit outline) -->
  <g transform="translate(1640, 80)" opacity="0.18">
    <circle cx="36" cy="36" r="26" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M36,10 L36,62 M10,36 L62,36" stroke="#ffffff" stroke-width="2"/>
    <circle cx="36" cy="20" r="3" fill="#ffffff"/>
    <circle cx="20" cy="36" r="3" fill="#ffffff"/>
    <circle cx="52" cy="36" r="3" fill="#ffffff"/>
    <circle cx="36" cy="52" r="3" fill="#ffffff"/>
  </g>
</svg>